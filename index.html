<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Fred Hobbs" />
    <link rel="stylesheet" href="./pages/index.css" />

    <title>Around the us</title>
  </head>
  <body class="page">
    <div class="page__content">
      <header class="header">
        <img
          class="header__logo"
          src="./images/header.svg"
          alt="around-the-us-logo"
        />
      </header>
      <main>
        <section class="profile">
          <img
            class="profile__image"
            src="./images/jacques-cousteau.jpg"
            alt="photo-of-jacques-cousteau"
          />
          <div class="profile__description">
            <div class="profile__caption">
              <h1 class="profile__title">Jacques Cousteau</h1>
              <button class="profile__edit-button" type="button"></button>
            </div>
            <p class="profile__subtitle">Explorer</p>
          </div>
          <button class="profile__add-button" type="button"></button>
        </section>
        <section class="cards">
          <article class="cards__content">
            <img
              class="cards__card"
              src="./images/card-images/yosemite.jpg"
              alt="photo-of-yosemite-valley"
            />
            <article class="cards__footer">
              <h2 class="cards__title">Yosemite Valley</h2>
              <button class="heart" type="button">
                <img
                  class="heart__image"
                  src="./images/vector2.svg"
                  alt="heart-icon"
                />
              </button>
            </article>
          </article>
          <article class="cards__content">
            <img
              class="cards__card"
              src="./images/card-images/lake-louise.jpg"
              alt="photo-of-lake-louise"
            />
            <article class="cards__footer">
              <h2 class="cards__title">Lake Louise</h2>
              <button class="heart" type="button">
                <img
                  class="heart__image"
                  src="./images/vector2.svg"
                  alt="heart-icon"
                />
              </button>
            </article>
          </article>
          <article class="cards__content">
            <img
              class="cards__card"
              src="./images/card-images/bald-mountains.jpg"
              alt="photo-of-bald-mountains"
            />
            <article class="cards__footer">
              <h2 class="cards__title">Bald Mountains</h2>
              <button class="heart" type="button">
                <img
                  class="heart__image"
                  src="./images/vector2.svg"
                  alt="heart-icon"
                />
              </button>
            </article>
          </article>
          <article class="cards__content">
            <img
              class="cards__card"
              src="./images/card-images/latemar.jpg"
              alt="photo-of-latenar"
            />
            <article class="cards__footer">
              <h2 class="cards__title">Latemar</h2>
              <button class="heart" type="button">
                <img
                  class="heart__image"
                  src="./images/vector2.svg"
                  alt="heart-icon"
                />
              </button>
            </article>
          </article>
          <article class="cards__content">
            <img
              class="cards__card"
              src="./images/card-images/vanoise.jpg"
              alt="photo-of-vanoise-national-park"
            />
            <article class="cards__footer">
              <h2 class="cards__title">Vanoise National Park</h2>
              <button class="heart" type="button">
                <img
                  class="heart__image"
                  src="./images/vector2.svg"
                  alt="heart-icon"
                />
              </button>
            </article>
          </article>
          <article class="cards__content">
            <img
              class="cards__card"
              src="./images/card-images/lago.jpg"
              alt="photo-of-Lago-Di-Braies"
            />
            <article class="cards__footer">
              <h2 class="cards__title">Lago Di Braies</h2>
              <button class="heart" type="button">
                <img
                  class="heart__image"
                  src="./images/vector2.svg"
                  alt="heart-icon"
                />
              </button>
            </article>
          </article>
        </section>
      </main>
      <footer class="footer">
        <p class="footer__title">&copy; 2024 Around The U.S.</p>
      </footer>
    </div>
  </body>
</html>
